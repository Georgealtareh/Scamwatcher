services:
  - type: web
    name: scamwatch-backend
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: TEAM_DB_URL
        sync: false
      - key: TEAM_DB_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
    rootDirectory: backend
